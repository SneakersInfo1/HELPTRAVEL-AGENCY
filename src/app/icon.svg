<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="HelpTravel">
  <defs>
    <radialGradient id="sky" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="55%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </radialGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>

  <!-- Outer navy ring -->
  <circle cx="256" cy="256" r="244" fill="#1E3A8A"/>
  <!-- Green accent ring -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#22C55E" stroke-width="10"/>
  <!-- Sky -->
  <circle cx="256" cy="256" r="216" fill="url(#sky)"/>

  <!-- Bottom clouds -->
  <g fill="url(#cloud)">
    <path d="M40 360 q40 -45 90 -25 q35 -28 80 -8 q40 -22 90 0 q35 -18 80 6 q40 -12 80 18 v60 a216 216 0 0 1 -420 0 z"/>
    <path d="M70 405 q35 -22 70 -10 q35 -18 75 -2 q40 -16 80 4 q35 -16 75 2 q35 -10 65 12 v40 a216 216 0 0 1 -440 0 z" opacity="0.85"/>
  </g>

  <!-- Contrails -->
  <g stroke="#BFDBFE" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M120 320 q60 -20 120 -55"/>
    <path d="M150 360 q70 -22 130 -55" opacity="0.7"/>
  </g>

  <!-- Plane (navy with white outline) -->
  <g transform="translate(256 200) rotate(-25)">
    <g stroke="#FFFFFF" stroke-width="14" stroke-linejoin="round" fill="#1E3A8A">
      <!-- Fuselage + wings -->
      <path d="M -120 0 L 100 -22 L 140 -10 L 140 10 L 100 22 L -120 0 Z"/>
      <!-- Top wing -->
      <path d="M -10 -8 L -50 -90 L -20 -90 L 30 -8 Z"/>
      <!-- Bottom wing -->
      <path d="M -10 8 L -50 90 L -20 90 L 30 8 Z"/>
      <!-- Tail -->
      <path d="M 90 -10 L 70 -45 L 90 -45 L 120 -12 Z"/>
    </g>
    <!-- Cockpit window -->
    <ellipse cx="115" cy="-2" rx="10" ry="5" fill="#FFFFFF" opacity="0.85"/>
  </g>
</svg>
